name: 提问与求助 (Question / Support)
description: 关于配置、安装或使用上的疑问（非代码故障）
title: "[help] "
labels: ["help wanted", "question"]
body:
  - type: textarea
    id: question
    attributes:
      label: 你的问题 (Question)
      description: 请简要描述你遇到的困难或疑问。例如：我不确定 config.json 里的 token 字段该怎么填？
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: 你尝试过的方法 (What you've tried)
      description: 你查阅过文档或做过哪些尝试？例如：我看了 README，但是没找到关于代理设置的说明。
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 系统/版本
  - type: input
    id: version
    attributes:
      label: 项目版本
  - type: textarea
    id: logs
    attributes:
      label: 相关日志 (Logs)
      description: 如果有报错提示，请贴在这里：
      render: text
